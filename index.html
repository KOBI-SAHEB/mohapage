<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Universe King</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>Universe King</h1>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Profile</a></li>
                    <li><a href="#">Logout</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section id="feed">
                <h2>Social Feed</h2>
                <div id="posts"></div>
                <form id="postForm">
                    <textarea id="postContent" placeholder="What's on your mind?" required></textarea>
                    <button type="submit">Post</button>
                </form>
            </section>
            <section id="audioUpload">
                <h2>Upload Audio</h2>
                <input type="file" id="audioFile" accept="audio/*" required>
                <button id="uploadAudio">Upload</button>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 Universe King</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
